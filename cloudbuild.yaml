substitutions:
  _REGION: asia-southeast1
  _API_SERVICE: warehouse-api
  _WEB_SERVICE: warehouse-web
  _CLOUD_SQL_INSTANCE: ${PROJECT_ID}:${_REGION}:warehouse-db

steps:
  # ── API image ─────────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - apps/api/Dockerfile
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/warehouse/${_API_SERVICE}:${SHORT_SHA}
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/warehouse/${_API_SERVICE}:${SHORT_SHA}

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_API_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/warehouse/${_API_SERVICE}:${SHORT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --add-cloudsql-instances=${_CLOUD_SQL_INSTANCE}
      - --set-env-vars=DATABASE_SSL=true
      - --set-secrets=DATABASE_URL=warehouse-database-url:latest,TRCLOUD_PASSKEY=trcloud-passkey:latest,TRCLOUD_PASSWORD=trcloud-password:latest

  # ── Web image ─────────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - apps/web/Dockerfile
      - --build-arg
      - NEXT_PUBLIC_API_URL=https://${_API_SERVICE}-REPLACE.run.app
      - --build-arg
      - NEXT_PUBLIC_USE_MOCK=0
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/warehouse/${_WEB_SERVICE}:${SHORT_SHA}
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/warehouse/${_WEB_SERVICE}:${SHORT_SHA}

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_WEB_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/warehouse/${_WEB_SERVICE}:${SHORT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated

images:
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/warehouse/${_API_SERVICE}:${SHORT_SHA}
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/warehouse/${_WEB_SERVICE}:${SHORT_SHA}

options:
  logging: CLOUD_LOGGING_ONLY
